name: Documentation Request
description: Request clearer docs, examples, or contributor guidance.
title: "docs: "
labels:
  - documentation
  - area/docs
  - needs-triage
body:
  - type: input
    id: page
    attributes:
      label: Page or topic
      placeholder: "README, quick start, testing, deployment, RBAC..."
    validations:
      required: true
  - type: textarea
    id: gap
    attributes:
      label: What is unclear or missing?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected documentation
      description: What example, command, explanation, or diagram would help?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
    validations:
      required: false
