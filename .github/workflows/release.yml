name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Upsert release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          title="mss-boot ${tag}"

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release edit "${tag}" \
              --title "${title}" \
              --draft=false \
              --prerelease=false
          else
            gh release create "${tag}" \
              --verify-tag \
              --generate-notes \
              --title "${title}"
          fi
